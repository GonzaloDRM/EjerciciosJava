<body>
    <h1>Papas fritas</h1>
    <p>Recetas para papa fritas</p>
    <img src="https://cdn.recetas360.com/wp-content/uploads/2019/07/como-hacer-papas-fritas-de-mcdonals.jpg" width="200px" height="200px">
    <h2>Ingredientes</h2>
    <ul>
        <li>3 o 4 papas(300gr)</li>
        <li>Aceite</li>
        <li>Sal</li>
    </ul>
    <br>
    <h2>Elaboración (Pasos)</h2>
    <ul>
        <li>Pelar las papas</li>
        <li>Cortarlas en basto</li>
        <li>Calentar aceite en una sarten</li>
        <li>Cocinar hasta que esten doradas</li>
        <li>Removerlas del aceite y salar a gusto</li>
    </ul>
</body>
